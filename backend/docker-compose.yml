version: "3.9"

services:
  api_service:
    build: ./api_service
    ports:
      - "8000:8000"
    env_file:
      - ./api_service/.env
    volumes:
      - ./api_service/app:/app/app

  inference_service:
    build: ./inference_service
    ports:
      - "8001:8001"
    env_file:
      - ./inference_service/.env
    volumes:
      - ./inference_service/app:/app/app

  llm_coach_service:
    build: ./llm_coach_service
    ports:
      - "8002:8002"
    env_file:
      - ./llm_coach_service/.env
    volumes:
      - ./llm_coach_service/app:/app/app
