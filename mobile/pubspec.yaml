name: repsense
description: "RepSense — Every Rep. Perfected. AI-powered strength training platform."
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  flutter_bloc: ^8.1.6
  bloc: ^8.1.4

  # Routing
  go_router: ^14.2.0

  # Supabase (Auth + Postgres DB + Storage)
  supabase_flutter: ^2.5.6

  # Networking
  dio: ^5.4.3+1

  # Local storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.2.2

  # Camera + on-device pose detection
  camera: ^0.11.0+2
  google_mlkit_pose_detection: ^0.13.0
  permission_handler: ^11.3.1

  # Charts
  fl_chart: ^0.68.0

  # Animations
  lottie: ^3.1.2
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0

  # Utils
  equatable: ^2.0.5
  collection: ^1.18.0
  intl: ^0.19.0
  logger: ^2.4.0
  flutter_dotenv: ^5.1.0
  google_fonts: ^6.2.1
  cached_network_image: ^3.3.1
  uuid: ^4.4.0
  flutter_tts: ^4.0.2
  share_plus: ^10.1.2
  flutter_local_notifications: ^17.2.2
  speech_to_text: ^7.0.0
  image_picker: ^1.1.2
  image: ^4.2.0

  cupertino_icons: ^1.0.8
  confetti: ^0.8.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/images/
    - assets/lottie/
